name: Build Shadchan (Android + Windows)

# Builds a debug APK on every push, and a Windows .msi/.exe installer alongside it.
# Both show up as downloadable "Artifacts" on the workflow run page - no signing
# keys or store accounts needed.

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :composeApp:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shadchan-debug-apk
          path: composeApp/build/outputs/apk/debug/composeApp-debug.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Build Windows installer (.msi and .exe)
        run: ./gradlew.bat :composeApp:packageReleaseMsi :composeApp:packageReleaseExe --stacktrace

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: shadchan-windows-installer
          path: |
            composeApp/build/compose/binaries/main-release/msi/*.msi
            composeApp/build/compose/binaries/main-release/exe/*.exe
